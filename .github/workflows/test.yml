name: self test

on:
    push:
        branches: [ master ]

    pull_request:
        branches: [ master ]

jobs:
    macos:
        runs-on: macos-26
        name: macOS

        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Install Unidoc 💖
                uses: ./

            -   name: 💖 Check Unidoc 💖
                run: unidoc --help

    linux:
        runs-on: ubuntu-24.04
        name: Ubuntu 24.04

        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Install Unidoc 💖
                uses: ./

            -   name: 💖 Check Unidoc 💖
                run: unidoc --help
